name: GitHub Actions Security Analysis

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - main
      - "renovate/**"
    paths:
      - ".github/workflows/**"

permissions: {}

jobs:
  zizmor:
    uses: luxass/shared-workflows/.github/workflows/reusable-ci-security.yaml@495f6427f288e78bddfca573876da1357549379d # v0.8.3
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    with:
      zizmor-version: v1.25.0
